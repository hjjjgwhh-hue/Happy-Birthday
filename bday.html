<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ruhee 🎉</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 350px;
}

h1 {
    color: #ff4b5c;
    font-size: 24px;
}

.name {
    font-size: 22px;
    font-weight: bold;
}

/* Typing text */
.typing {
    font-size: 15px;
    color: #555;
    border-right: 2px solid #555;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    margin: 15px auto;
    animation: typing 4s steps(60, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

/* Cake */
.cake {
    position: relative;
    margin: 20px auto;
    width: 120px;
    height: 120px;
}

.layer {
    position: absolute;
    width: 120px;
    height: 40px;
    background: #ff6f61;
    border-radius: 10px;
}

.layer:nth-child(1) { bottom: 0; }
.layer:nth-child(2) { bottom: 30px; background: #ff8a75; }
.layer:nth-child(3) { bottom: 60px; background: #ffa69e; }

.candle {
    position: absolute;
    width: 10px;
    height: 30px;
    background: #fff;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
}

.flame {
    position: absolute;
    width: 10px;
    height: 15px;
    background: orange;
    border-radius: 50%;
    top: -15px;
    animation: flicker 0.5s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* Buttons */
button {
    margin: 8px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday 🎉</h1>
    <div class="name">Ruhee 💖</div>

    <div class="cake">
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="candle">
            <div class="flame"></div>
        </div>
    </div>

    <div class="typing" id="message">
        Wishing you a day full of happiness, laughter, and beautiful memories ❤️
    </div>

    <button onclick="blowCandle()">Blow Candle 🎂</button>
    <button onclick="playMusic()">Play Music 🎵</button>

    <audio id="music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function blowCandle() {
    document.querySelector('.flame').style.display = 'none';
    alert("Make a wish! 🎉");
}

function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
