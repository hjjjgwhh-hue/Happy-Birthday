<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ruhee 🎉</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 400px;
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        color: #ff4b5c;
        font-size: 28px;
    }

    .name {
        font-size: 24px;
        font-weight: bold;
        color: #333;
    }

    p {
        color: #555;
        font-size: 16px;
        margin-top: 15px;
    }

    .heart {
        font-size: 24px;
        animation: beat 1s infinite;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes beat {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

<div class="card">
    <h1>🎉 Happy Birthday 🎉</h1>
    <div class="name">Ruhee 💖</div>
    <p>
        Wishing you a day filled with happiness, laughter, and lots of beautiful memories.  
        May this year bring you everything you’ve been dreaming of!
    </p>
    <div class="heart">❤️</div>
</div>

</body>
</html>
